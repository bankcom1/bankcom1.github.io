<script>

let credits = JSON.parse(localStorage.getItem("credits")) || {
    Sean: 0,
    Breanna: 0,
    Grayson: 0,
    Willow: 0
};

function saveCredits() {
    localStorage.setItem("credits", JSON.stringify(credits));
}

function updateBalances() {
    document.getElementById("SeanBalance").textContent = credits.Sean;
    document.getElementById("BreannaBalance").textContent = credits.Breanna;
    document.getElementById("GraysonBalance").textContent = credits.Grayson;
    document.getElementById("WillowBalance").textContent = credits.Willow;
}

function changeCredits(person, add) {

    const input = document.getElementById(person + "Amount");
    let amount = parseInt(input.value);

    if (isNaN(amount) || amount <= 0) {
        alert("Please enter a valid number greater than 0.");
        input.focus();
        return;
    }

    if (add) {
        credits[person] += amount;
    } else {
        credits[person] -= amount;
    }

    saveCredits();
    updateBalances();

    alert(
        (add ? "Added " : "Removed ") +
        amount +
        " credit" +
        (amount !== 1 ? "s" : "") +
        " " +
        (add ? "to " : "from ") +
        person +
        ".\n\nNew Balance: " +
        credits[person]
    );

    input.value = "";
    input.focus();
}

function setupEnter(person) {

    const input = document.getElementById(person + "Amount");

    input.addEventListener("keydown", function(event) {

        if (event.key === "Enter") {
            event.preventDefault();
            changeCredits(person, true);
        }

    });

}

setupEnter("Sean");
setupEnter("Breanna");
setupEnter("Grayson");
setupEnter("Willow");

// Show balances immediately when the page loads
updateBalances();

</script>
