<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Center</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 350px;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            background: #2a5298;
            color: white;
            transition: 0.25s;
        }

        .btn:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 25px;
            color: gray;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>FC Center</h1>

    <button class="btn" onclick="window.location.href='controlpass.html'">
        Enter Control Site
    </button>

    <button class="btn" onclick="window.location.href='credsofpeople.html'">
        Credits of People
    </button>

    <button class="btn" onclick="window.location.href='login.html'">
        Login
    </button>
    
    <footer>
        Family Credit Center
    </footer>
</div>

</body>
</html>
