<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FC Center - Transaction History</title>

<script src="bank.js"></script>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    padding-bottom:40px;

}



h1{

    color:white;
    text-align:center;
    padding:30px;

}



.container{

    max-width:700px;
    margin:auto;
    padding:20px;

}



.transaction{

    background:white;
    border-radius:15px;
    padding:20px;
    margin:15px 0;
    box-shadow:0 5px 15px rgba(0,0,0,.25);

}



.person{

    font-size:22px;
    font-weight:bold;
    color:#1e3c72;

}



.added{

    color:#2ecc71;
    font-size:20px;
    font-weight:bold;

}



.removed{

    color:#e74c3c;
    font-size:20px;
    font-weight:bold;

}



.reason{

    margin-top:10px;
    color:#555;

}



.date{

    margin-top:10px;
    font-size:14px;
    color:#888;

}



button{

    display:block;
    width:250px;
    padding:12px;
    margin:30px auto;

    border:none;
    border-radius:10px;

    background:#34495e;
    color:white;

    font-size:16px;
    cursor:pointer;

}



.empty{

    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;

}



</style>


</head>


<body>


<h1>
Transaction History
</h1>



<div class="container" id="history">


</div>



<button onclick="location.href='0173.html'">
Back To Control Panel
</button>



<script>


function loadHistory(){


let box =
document.getElementById("history");



let transactions =
getTransactions();



if(transactions.length === 0){


box.innerHTML =
`
<div class="empty">
No transactions yet.
</div>
`;


return;


}




transactions.forEach(function(transaction){



let colorClass =
transaction.type.includes("Added")
?
"added"
:
"removed";



let symbol =
transaction.type.includes("Added")
?
"+"
:
"-";



box.innerHTML +=
`

<div class="transaction">


<div class="person">

${transaction.person}

</div>



<div class="${colorClass}">

${symbol}${transaction.amount} Credits

</div>



<div>

${transaction.type}

</div>



<div class="reason">

Reason:
${transaction.reason}

</div>



<div class="date">

${transaction.date}

</div>


</div>

`;



});



}




window.onload=function(){

loadHistory();

};


</script>



</body>

</html>
